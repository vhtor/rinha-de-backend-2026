worker_processes auto;

events {
    worker_connections 1024;
}

http {
    access_log off;

    upstream api {
        server api1:9999;
        server api2:9999;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }
    }
}
